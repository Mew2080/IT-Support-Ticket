<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICE ENGINEERING - Create Ticket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/logo2.png">
    <link rel="shortcut icon" type="image/png" href="img/logo2.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="top-navbar">
        <div class="top-navbar-shell">
            <div class="top-navbar-inner">
                <div class="nav-left">
                    <a href="index.html" class="nav-brand">
                        <img src="img/logo2.png" alt="SET Logo" class="nav-logo">
                        <span class="nav-title">IT Support Ticket</span>
                    </a>
                </div>
                <div class="nav-right">
                    <div class="nav-dropdown">
                        <button type="button" class="nav-btn nav-btn-ghost nav-dropdown-toggle">
                            <span>Menu</span><span class="nav-dropdown-chevron">▾</span>
                        </button>
                        <div class="nav-dropdown-menu">
                            <a href="dashboard.html" class="nav-dropdown-item">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                                <span>Home</span>
                            </a>
                            <a href="my_tickets.html" class="nav-dropdown-item">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <span>My Tickets</span>
                            </a>
                            <a href="profile.html" class="nav-dropdown-item">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <span>Profile</span>
                            </a>
                            <div class="nav-dropdown-divider"></div>
                            <a href="index.html" class="nav-dropdown-item nav-dropdown-item-danger">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>เปิด Ticket ใหม่</h1>
            <div class="user-info">
                <span>สมชาย ใจดี</span>
                <a href="profile.html" class="user-role-badge role-user" aria-label="User">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4zm0 2c3.3 0 6 2.7 6 6H6c0-3.3 2.7-6 6-6z"></path></svg>
                </a>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="action-card" style="max-width: 700px; margin: 0 auto;">
                <h2>แบบฟอร์มเปิด Ticket</h2>

                <div id="success-message" style="display: none; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--primary-color); color: var(--primary-color); padding: 14px 18px; border-radius: 8px; margin-bottom: 18px; font-weight: 500;">
                    ✓ สร้าง Ticket สำเร็จ! กำลังนำไปยังหน้า Dashboard...
                </div>

                <form id="createTicketForm" class="auth-form" style="margin-top: 0;" onsubmit="submitTicket(event)">
                    <div class="form-group">
                        <label for="subject">หัวข้อปัญหา <span style="color: var(--error-color);">*</span></label>
                        <input type="text" id="subject" name="subject" required maxlength="255" class="form-group input" placeholder="กรอกหัวข้อปัญหา">
                    </div>

                    <div class="form-group">
                        <label for="category">หมวดหมู่ <span style="color: var(--error-color);">*</span></label>
                        <select id="category" name="category" required class="form-group input">
                            <option value="">-- เลือกหมวดหมู่ --</option>
                            <option value="Hardware">Hardware</option>
                            <option value="Software">Software</option>
                            <option value="Network">Network</option>
                            <option value="Printer">Printer</option>
                            <option value="Account">Account / Password</option>
                            <option value="Email">Email</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="priority">ความสำคัญ <span style="color: var(--error-color);">*</span></label>
                        <select id="priority" name="priority" required class="form-group input">
                            <option value="">-- เลือกความสำคัญ --</option>
                            <option value="low">ต่ำ (Low)</option>
                            <option value="normal">ทั่วไป (Normal)</option>
                            <option value="urgent">ด่วน (Urgent)</option>
                            <option value="critical">วิกฤต (Critical)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="location">สถานที่ <span style="color: var(--error-color);">*</span></label>
                        <input type="text" id="location" name="location" required maxlength="255" class="form-group input" placeholder="เช่น ชั้น 3 ห้อง 302">
                    </div>

                    <div class="form-group">
                        <label for="description">รายละเอียดปัญหา <span style="color: var(--error-color);">*</span></label>
                        <textarea id="description" name="description" required rows="6" class="form-group input" style="resize: vertical;" placeholder="อธิบายปัญหาที่พบ..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="ticket_image">รูปภาพประกอบ (ไม่บังคับ)</label>
                        <div class="image-upload-wrapper">
                            <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('ticket_image').click()" style="border: 2px dashed #d1d5db; border-radius: 8px; padding: 30px; text-align: center; cursor: pointer; transition: border-color 0.2s;">
                                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 10px; display: block;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                <p style="color: #9ca3af; margin: 0;">คลิกเพื่อเลือกรูปภาพ หรือลากไฟล์มาวาง</p>
                                <p style="color: #c0c0c0; font-size: 0.8em; margin: 4px 0 0;">รองรับ PNG, JPG, JPEG (ขนาดไม่เกิน 5MB)</p>
                            </div>
                            <input type="file" id="ticket_image" name="ticket_image" accept="image/png,image/jpeg,image/jpg" style="display: none;" onchange="previewTicketImage(event)">
                        </div>
                        <div id="image-preview-container" style="display: none; margin-top: 12px;">
                            <div style="position: relative; display: inline-block;">
                                <img id="image-preview" src="" alt="Preview" style="max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid #e5e7eb;">
                                <button type="button" onclick="removeTicketImage()" style="position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;">&times;</button>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 8px;">
                        <button type="submit" class="btn btn-primary" style="flex: 1;">ส่ง Ticket</button>
                        <a href="dashboard.html" class="btn btn-secondary" style="flex: 1; text-align: center; line-height: 1.5;">ยกเลิก</a>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dropdown = document.querySelector('.nav-dropdown');
            const toggle = document.querySelector('.nav-dropdown-toggle');
            if (toggle && dropdown) {
                toggle.addEventListener('click', function(e) { e.stopPropagation(); dropdown.classList.toggle('nav-dropdown-active'); });
                document.addEventListener('click', function(e) { if (!dropdown.contains(e.target)) dropdown.classList.remove('nav-dropdown-active'); });
            }

            // Drag and drop
            const uploadArea = document.getElementById('imageUploadArea');
            if (uploadArea) {
                uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.style.borderColor = 'var(--primary-color)'; });
                uploadArea.addEventListener('dragleave', function() { uploadArea.style.borderColor = '#d1d5db'; });
                uploadArea.addEventListener('drop', function(e) {
                    e.preventDefault(); uploadArea.style.borderColor = '#d1d5db';
                    const file = e.dataTransfer.files[0];
                    if (file && file.type.startsWith('image/')) {
                        const fakeEvent = { target: { files: [file] } };
                        previewTicketImage(fakeEvent);
                    }
                });
            }
        });

        function previewTicketImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (!file.type.match('image/(png|jpeg|jpg)')) { alert('กรุณาเลือกไฟล์รูปภาพ PNG, JPG หรือ JPEG เท่านั้น'); return; }
            if (file.size > 5 * 1024 * 1024) { alert('ขนาดไฟล์เกิน 5MB กรุณาเลือกไฟล์ใหม่'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview-container').style.display = 'block';
                document.getElementById('imageUploadArea').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function removeTicketImage() {
            document.getElementById('ticket_image').value = '';
            document.getElementById('image-preview').src = '';
            document.getElementById('image-preview-container').style.display = 'none';
            document.getElementById('imageUploadArea').style.display = 'block';
        }

        function submitTicket(e) {
            e.preventDefault();
            const subject = document.getElementById('subject').value.trim();
            const category = document.getElementById('category').value;
            const priority = document.getElementById('priority').value;
            const location = document.getElementById('location').value.trim();
            const description = document.getElementById('description').value.trim();

            if (!subject || !category || !priority || !location || !description) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                return;
            }

            document.getElementById('success-message').style.display = 'block';
            document.getElementById('createTicketForm').style.opacity = '0.5';
            document.getElementById('createTicketForm').style.pointerEvents = 'none';

            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1800);
        }
    </script>
</body>
</html>
