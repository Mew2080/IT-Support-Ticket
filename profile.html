<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICE ENGINEERING - Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="img/logo2.png">
    <link rel="shortcut icon" type="image/png" href="img/logo2.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="top-navbar">
        <div class="top-navbar-shell">
            <div class="top-navbar-inner">
                <div class="nav-left">
                    <a href="index.html" class="nav-brand">
                        <img src="img/logo2.png" alt="SET Logo" class="nav-logo">
                        <span class="nav-title">IT Support Ticket</span>
                    </a>
                </div>
                <div class="nav-right">
                    <div class="nav-dropdown">
                        <button type="button" class="nav-btn nav-btn-ghost nav-dropdown-toggle">
                            <span>Menu</span><span class="nav-dropdown-chevron">▾</span>
                        </button>
                        <div class="nav-dropdown-menu">
                            <a href="dashboard.html" class="nav-dropdown-item">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                                <span>Home</span>
                            </a>
                            <a href="my_tickets.html" class="nav-dropdown-item">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <span>My Tickets</span>
                            </a>
                            <a href="profile.html" class="nav-dropdown-item">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                <span>Profile</span>
                            </a>
                            <div class="nav-dropdown-divider"></div>
                            <a href="index.html" class="nav-dropdown-item nav-dropdown-item-danger">
                                <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>โปรไฟล์</h1>
            <div class="user-info">
                <span>สมชาย ใจดี</span>
                <a href="profile.html" class="user-role-badge role-user" aria-label="User">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4zm0 2c3.3 0 6 2.7 6 6H6c0-3.3 2.7-6 6-6z"></path></svg>
                </a>
            </div>
        </header>

        <main class="dashboard-content">
            <div class="action-card" style="max-width: 650px; margin: 0 auto;">
                <!-- Profile Tabs -->
                <div class="profile-tabs" style="display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 24px;">
                    <button type="button" class="profile-tab active" id="tab-info" onclick="switchProfileTab('info')" style="padding: 10px 20px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-size: 1em; font-weight: 500; color: #6b7280; transition: all 0.2s; margin-bottom: -2px;">ข้อมูลส่วนตัว</button>
                    <button type="button" class="profile-tab" id="tab-edit" onclick="switchProfileTab('edit')" style="padding: 10px 20px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-size: 1em; font-weight: 500; color: #6b7280; transition: all 0.2s; margin-bottom: -2px;">แก้ไขข้อมูล</button>
                    <button type="button" class="profile-tab" id="tab-password" onclick="switchProfileTab('password')" style="padding: 10px 20px; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; font-size: 1em; font-weight: 500; color: #6b7280; transition: all 0.2s; margin-bottom: -2px;">เปลี่ยนรหัสผ่าน</button>
                </div>

                <!-- Info Tab -->
                <div id="content-info" class="profile-tab-content">
                    <div class="info-grid" style="grid-template-columns: 1fr; gap: 14px;">
                        <div class="info-item" style="display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6;">
                            <label style="min-width: 140px; font-weight: 600; color: #6b7280;">อีเมล:</label>
                            <span>somchai@company.com</span>
                        </div>
                        <div class="info-item" style="display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6;">
                            <label style="min-width: 140px; font-weight: 600; color: #6b7280;">ชื่อ-นามสกุล:</label>
                            <span>สมชาย ใจดี</span>
                        </div>
                        <div class="info-item" style="display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6;">
                            <label style="min-width: 140px; font-weight: 600; color: #6b7280;">เบอร์โทรศัพท์:</label>
                            <span>081-234-5678</span>
                        </div>
                        <div class="info-item" style="display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6;">
                            <label style="min-width: 140px; font-weight: 600; color: #6b7280;">แผนก:</label>
                            <span>Engineering</span>
                        </div>
                        <div class="info-item" style="display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f4f6;">
                            <label style="min-width: 140px; font-weight: 600; color: #6b7280;">บทบาท:</label>
                            <span>User</span>
                        </div>
                        <div class="info-item" style="display: flex; gap: 12px; padding: 12px 0;">
                            <label style="min-width: 140px; font-weight: 600; color: #6b7280;">วันที่สมัคร:</label>
                            <span>01/01/2026 08:00</span>
                        </div>
                    </div>
                </div>

                <!-- Edit Tab -->
                <div id="content-edit" class="profile-tab-content" style="display: none;">
                    <div id="edit-alert" style="display: none;"></div>
                    <form id="editProfileForm" onsubmit="saveProfile(event)">
                        <div class="form-group">
                            <label>อีเมล</label>
                            <input type="email" value="somchai@company.com" class="form-group input" readonly style="background: #f3f4f6; cursor: not-allowed;">
                        </div>
                        <div class="form-group">
                            <label for="p_fullname">ชื่อ-นามสกุล</label>
                            <input type="text" id="p_fullname" name="full_name" value="สมชาย ใจดี" class="form-group input">
                        </div>
                        <div class="form-group">
                            <label for="p_phone">เบอร์โทรศัพท์</label>
                            <input type="tel" id="p_phone" name="phone" value="081-234-5678" class="form-group input" placeholder="เช่น 081-234-5678">
                        </div>
                        <div class="form-group">
                            <label>แผนก</label>
                            <input type="text" value="Engineering" class="form-group input" readonly style="background: #f3f4f6; cursor: not-allowed;">
                        </div>
                        <div style="display: flex; gap: 12px; margin-top: 8px;">
                            <button type="submit" class="btn btn-primary" style="flex: 1;">บันทึกข้อมูล</button>
                            <button type="button" class="btn btn-secondary" onclick="switchProfileTab('info')" style="flex: 1;">ยกเลิก</button>
                        </div>
                    </form>
                </div>

                <!-- Password Tab -->
                <div id="content-password" class="profile-tab-content" style="display: none;">
                    <div id="pw-alert" style="display: none;"></div>
                    <form id="changePasswordForm" onsubmit="savePassword(event)">
                        <div class="form-group">
                            <label for="cur_password">รหัสผ่านปัจจุบัน *</label>
                            <div class="password-toggle-wrapper">
                                <input type="password" id="cur_password" name="current_password" required class="form-group input">
                                <button type="button" class="password-toggle-btn" onclick="togglePassword('cur_password')"><span id="cur_password-toggle-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></span></button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="new_pw">รหัสผ่านใหม่ *</label>
                            <div class="password-toggle-wrapper">
                                <input type="password" id="new_pw" name="new_password" required minlength="6" class="form-group input">
                                <button type="button" class="password-toggle-btn" onclick="togglePassword('new_pw')"><span id="new_pw-toggle-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></span></button>
                            </div>
                            <small>รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร ตัวพิมพ์ใหญ่ 1 ตัว และอักษรพิเศษ 1 ตัว</small>
                        </div>
                        <div class="form-group">
                            <label for="confirm_pw">ยืนยันรหัสผ่านใหม่ *</label>
                            <div class="password-toggle-wrapper">
                                <input type="password" id="confirm_pw" name="confirm_password" required class="form-group input">
                                <button type="button" class="password-toggle-btn" onclick="togglePassword('confirm_pw')"><span id="confirm_pw-toggle-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></span></button>
                            </div>
                        </div>
                        <div style="display: flex; gap: 12px; margin-top: 8px;">
                            <button type="submit" class="btn btn-primary" style="flex: 1;">เปลี่ยนรหัสผ่าน</button>
                            <button type="button" class="btn btn-secondary" onclick="switchProfileTab('info')" style="flex: 1;">ยกเลิก</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dropdown = document.querySelector('.nav-dropdown');
            const toggle = document.querySelector('.nav-dropdown-toggle');
            if (toggle && dropdown) {
                toggle.addEventListener('click', function(e) { e.stopPropagation(); dropdown.classList.toggle('nav-dropdown-active'); });
                document.addEventListener('click', function(e) { if (!dropdown.contains(e.target)) dropdown.classList.remove('nav-dropdown-active'); });
            }
        });

        function switchProfileTab(tab) {
            ['info', 'edit', 'password'].forEach(function(t) {
                document.getElementById('content-' + t).style.display = 'none';
                const btn = document.getElementById('tab-' + t);
                btn.style.color = '#6b7280';
                btn.style.borderBottomColor = 'transparent';
            });
            document.getElementById('content-' + tab).style.display = 'block';
            const activeBtn = document.getElementById('tab-' + tab);
            activeBtn.style.color = 'var(--primary-color)';
            activeBtn.style.borderBottomColor = 'var(--primary-color)';
        }

        function showProfileAlert(elId, msg, type) {
            const el = document.getElementById(elId);
            el.className = type === 'success'
                ? 'alert'
                : 'alert';
            el.style.display = 'block';
            el.style.padding = '12px 16px';
            el.style.borderRadius = '8px';
            el.style.marginBottom = '16px';
            el.style.fontWeight = '500';
            if (type === 'success') {
                el.style.background = 'rgba(16,185,129,0.1)';
                el.style.border = '1px solid var(--primary-color)';
                el.style.color = 'var(--primary-color)';
            } else {
                el.style.background = 'rgba(239,68,68,0.1)';
                el.style.border = '1px solid var(--error-color)';
                el.style.color = 'var(--error-color)';
            }
            el.textContent = msg;
        }

        function saveProfile(e) {
            e.preventDefault();
            const phone = document.getElementById('p_phone').value;
            if (phone) {
                const digits = phone.replace(/\D/g, '');
                if (digits.length < 9 || digits.length > 10) {
                    showProfileAlert('edit-alert', 'เบอร์โทรศัพท์ต้องเป็นตัวเลข 9-10 หลัก', 'error');
                    return;
                }
            }
            showProfileAlert('edit-alert', '✓ บันทึกข้อมูลสำเร็จ', 'success');
            setTimeout(function() { document.getElementById('edit-alert').style.display = 'none'; }, 3000);
        }

        function savePassword(e) {
            e.preventDefault();
            const newPw = document.getElementById('new_pw').value;
            const confirmPw = document.getElementById('confirm_pw').value;
            if (newPw !== confirmPw) { showProfileAlert('pw-alert', 'รหัสผ่านไม่ตรงกัน', 'error'); return; }
            if (newPw.length < 6) { showProfileAlert('pw-alert', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร', 'error'); return; }
            if (!/[A-Z]/.test(newPw)) { showProfileAlert('pw-alert', 'รหัสผ่านต้องมีตัวอักษรพิมพ์ใหญ่อย่างน้อย 1 ตัว', 'error'); return; }
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(newPw)) { showProfileAlert('pw-alert', 'รหัสผ่านต้องมีอักษรพิเศษอย่างน้อย 1 ตัว', 'error'); return; }
            showProfileAlert('pw-alert', '✓ เปลี่ยนรหัสผ่านสำเร็จ', 'success');
            document.getElementById('changePasswordForm').reset();
            setTimeout(function() { document.getElementById('pw-alert').style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
